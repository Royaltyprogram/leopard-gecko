<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Second Page</title>
    <style>
      :root {
        --bg: #fff7ef;
        --card: rgba(255, 255, 255, 0.86);
        --text: #2f241d;
        --accent: #f19a5b;
        --border: rgba(47, 36, 29, 0.12);
        --shadow: rgba(71, 44, 18, 0.14);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(circle at top left, rgba(241, 154, 91, 0.3), transparent 30%),
          linear-gradient(180deg, #fffdf9 0%, var(--bg) 100%);
        color: var(--text);
        font-family: Georgia, "Times New Roman", serif;
      }

      main {
        width: min(100%, 640px);
        padding: 48px 40px;
        border: 1px solid var(--border);
        border-radius: 28px;
        background: var(--card);
        box-shadow: 0 24px 80px var(--shadow);
        text-align: center;
      }

      p {
        margin: 0 0 12px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        font-size: 0.82rem;
        opacity: 0.7;
      }

      h1 {
        margin: 0 0 14px;
        font-size: clamp(2.4rem, 8vw, 4.4rem);
        line-height: 0.95;
      }

      .message {
        margin: 0;
        font-size: 1.05rem;
        line-height: 1.7;
      }

      .dot {
        display: inline-block;
        width: 12px;
        height: 12px;
        margin-left: 8px;
        border-radius: 999px;
        background: var(--accent);
        box-shadow: 0 0 0 10px rgba(241, 154, 91, 0.14);
      }
    </style>
  </head>
  <body>
    <main>
      <p>new page <span class="dot"></span></p>
      <h1>Hello Again</h1>
      <p class="message">This is a separate HTML page you can open on its own.</p>
    </main>
  </body>
</html>
