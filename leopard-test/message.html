<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>little note</title>
    <style>
      :root {
        --bg: #fff8ef;
        --card: rgba(255, 255, 255, 0.8);
        --text: #2b2118;
        --accent: #ff9f6e;
        --border: rgba(43, 33, 24, 0.08);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(circle at top, rgba(255, 159, 110, 0.28), transparent 30%),
          linear-gradient(180deg, #fffdf9 0%, var(--bg) 100%);
        color: var(--text);
        font-family: "Iowan Old Style", "Palatino Linotype", Georgia, serif;
      }

      main {
        width: min(100%, 620px);
        padding: 40px 32px;
        border: 1px solid var(--border);
        border-radius: 28px;
        background: var(--card);
        backdrop-filter: blur(10px);
        box-shadow: 0 24px 60px rgba(108, 74, 46, 0.12);
        text-align: center;
      }

      p {
        margin: 0 0 12px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        font-size: 0.75rem;
        color: #8b6a54;
      }

      h1 {
        margin: 0 0 16px;
        font-size: clamp(2rem, 7vw, 4rem);
        line-height: 0.95;
      }

      .note {
        margin: 0;
        font-size: 1.05rem;
        line-height: 1.7;
      }
    </style>
  </head>
  <body>
    <main>
      <p>little note</p>
      <h1>오늘도 잘하고 있어.</h1>
      <p class="note">급하게 가지 않아도 괜찮아요. 한 줄씩, 하나씩 만들다 보면 페이지는 결국 완성됩니다.</p>
    </main>
  </body>
</html>
