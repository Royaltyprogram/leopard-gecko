<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Leopard Gecko Success</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="card">
      <section class="copy">
        <p class="eyebrow" id="status-text">status</p>
        <h1>Test success</h1>
        <p class="message" id="message">
          Your page is working, and now it has a tiny gecko cheering for it.
        </p>
        <button class="hello-button" id="hello-button" type="button">Say hi</button>
      </section>

      <section class="mascot-panel" aria-label="Cute leopard gecko illustration">
        <div class="bubble">boop</div>
        <div class="mascot">
          <div class="tail"></div>
          <div class="body">
            <span class="spot spot-1"></span>
            <span class="spot spot-2"></span>
            <span class="spot spot-3"></span>
            <span class="spot spot-4"></span>
          </div>
          <div class="head">
            <span class="eye eye-left"></span>
            <span class="eye eye-right"></span>
            <span class="blush blush-left"></span>
            <span class="blush blush-right"></span>
            <span class="nose"></span>
            <span class="smile"></span>
          </div>
          <span class="foot foot-front"></span>
          <span class="foot foot-back"></span>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
